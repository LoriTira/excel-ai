name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - run: npm ci

      - run: npm run build

      # Copy dist into server/static for Go embedding
      - run: rm -rf server/static && cp -r dist server/static

      # Cross-compile server binary for all platforms
      - name: Build server binaries
        run: |
          cd server
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o ../dist/excelai-server-darwin-arm64  .
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/excelai-server-darwin-amd64  .
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/excelai-server-windows-amd64.exe .
          GOOS=windows GOARCH=arm64 go build -ldflags="-s -w" -o ../dist/excelai-server-windows-arm64.exe .

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
