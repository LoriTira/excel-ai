<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Excel AI</title>

    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>

<body style="font-family: 'Segoe UI', sans-serif; padding: 20px;">
    <h2>Excel AI</h2>
    <p>Use <code>=EXCELAI.AI("your prompt")</code> in any cell.</p>
    <h3>Examples</h3>
    <ul>
        <li><code>=EXCELAI.AI("What is 2+2?")</code></li>
        <li><code>=EXCELAI.AI("Classify sentiment", A1)</code></li>
        <li><code>=EXCELAI.AI("Summarize", A1:A10)</code></li>
    </ul>
    <h3>Requirements</h3>
    <p>LM Studio must be running on <code>localhost:1234</code> with CORS enabled.</p>
</body>

</html>
